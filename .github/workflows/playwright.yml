name: End-to-End Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

defaults:
  run:
    working-directory: bloglist

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Set up environment file
        run: |
          echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" > .env.test
          echo "NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}" >> .env.test
          echo "NEXTAUTH_URL=${{ secrets.NEXTAUTH_URL }}" >> .env.test
          echo "NODE_ENV=test" >> .env.test

      - name: Verify environment setup
        run: |
          echo "Checking .env.test file:"
          cat .env.test | sed 's/=.*/=***/'
          echo ""
          echo "DATABASE_URL secret exists: ${{ secrets.DATABASE_URL != '' }}"
          echo "NEXTAUTH_SECRET secret exists: ${{ secrets.NEXTAUTH_SECRET != '' }}"
          echo "NEXTAUTH_URL secret exists: ${{ secrets.NEXTAUTH_URL != '' }}"

      - name: Run database migrations
        run: npx drizzle-kit push

      - name: Run Playwright tests
        run: npx playwright test

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: bloglist/playwright-report/
          retention-days: 30
